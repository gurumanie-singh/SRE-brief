personalization:
  preferred_vendors: []
  highlight_keywords: []
  # Minimum impact band to include in email (critical, high, medium, low)
  email_min_impact: ""

settings:
  timezone: "America/Chicago"
  active_days: 7
  # Homepage primary filter: articles with RSS calendar day >= (today UTC − this many days).
  homepage_calendar_days: 7
  # If that filter yields zero rows but data exists, show newest items by published timestamp.
  homepage_recency_fallback: true
  max_retention_days: 30
  max_articles_per_day: 20
  max_articles_per_page: 30
  email_max_articles: 15
  site_title: "SRE Brief"
  site_description: "Daily operational reliability briefing distilled from engineering RSS sources"
  site_base_url: ""
  # Optional: fetch article HTML for richer classification (slower, more network use)
  enrich_fetch_full_article: false
  scrape_timeout_seconds: 12
  scrape_max_chars: 12000
  scrape_max_articles_per_run: 8
