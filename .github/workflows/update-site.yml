name: Hourly Site Update

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sre-brief-pipeline
  cancel-in-progress: false

jobs:
  update-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run hourly site update
        run: python -m scripts.run_hourly

      - name: Report pipeline stats
        if: always()
        run: |
          echo "=== data/pipeline_stats.json ==="
          if [ -f data/pipeline_stats.json ]; then
            cat data/pipeline_stats.json
          else
            echo "MISSING: data/pipeline_stats.json (process step may have failed before write)"
          fi
          echo "=== data/days (day JSON files) ==="
          ls -la data/days/*.json 2>/dev/null || echo "No day JSON files present"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git rm --cached --ignore-unmatch data/articles.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: hourly site update — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase || true
            git push
          fi
