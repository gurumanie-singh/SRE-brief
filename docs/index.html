<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRE Brief — Operational Reliability Feed</title>
  <meta name="description" content="Daily operational reliability briefing distilled from engineering RSS sources">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <nav class="site-nav">
    <a href="index.html" class="nav-logo">SRE Brief</a>
    <div class="nav-right">
      <a href="index.html" class="nav-link">Latest</a>
      <a href="archive/index.html" class="nav-link">Archive</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
    </div>
  </nav>

  <main>
<div class="section-inner">

  <div class="brief-header">
    <div class="brief-primary">
      <h1 class="brief-title">18 April 2026</h1>
      <div class="brief-update">
        <span class="brief-pulse"></span>
        <time data-iso="2026-04-18T21:15:05.162091-05:00">18 April 2026, 21:15</time>
        <span class="brief-tz">CDT</span>
      </div>
    </div>
  </div>


  <div class="controls-bar" id="controlsBar">
    <div class="search-wrap">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" class="search-input" id="searchInput" placeholder="Search titles, vendors, themes, outages…" autocomplete="off">
      <button class="search-clear" id="searchClear" aria-label="Clear search">×</button>
    </div>
    <div class="quick-filters" id="quickFilters">
      <button class="qf-btn qf-action" data-filter-group="special" data-filter-value="priority">Ops priority</button>
      <button class="qf-btn" data-filter-group="special" data-filter-value="6h">Last 6h</button>
    </div>
  </div>

  <div class="filter-results-count" id="filterCount" style="display:none"></div>



  <div class="empty-state">
    <div class="empty-state-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div>
    <p>No articles yet. The hourly workflow will populate this feed after the first successful run.</p>
  </div>
</div>
  </main>

  <footer class="site-footer">
    <a href="index.html" class="footer-logo">SRE Brief</a>
    <p class="footer-text">Generated from public RSS sources — operational reference only</p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
